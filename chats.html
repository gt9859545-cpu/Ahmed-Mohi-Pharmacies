<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المحادثات - صيدليات أحمد محي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .chat-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: calc(100vh - 140px);
            gap: 20px;
        }

        .chat-sidebar {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-list-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 800;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-list-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-list-item:hover { background: rgba(0,0,0,0.02); }
        .chat-list-item.active { background: #f0f7ff; border-right: 4px solid var(--primary-color); }

        .chat-window {
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-box-header {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-box-messages {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-box-input {
            padding: 20px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 15px;
        }

        .chat-box-input input {
            flex: 1;
            padding: 12px 20px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
        }

        .msg {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 0.95rem;
        }
        .msg-staff { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-left-radius: 2px; }
        .msg-cust { align-self: flex-start; background: white; border: 1px solid var(--border-color); border-bottom-right-radius: 2px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="../logo.jpg" alt="Logo">
            <span>مدير الصيدلية</span>
        </div>
        <ul class="sidebar-menu">
            <a href="index.html" class="menu-item"><i class="fa-solid fa-chart-line"></i><span>لوحة التحكم</span></a>
            <a href="orders.html" class="menu-item"><i class="fa-solid fa-box-open"></i><span>الطلبات</span></a>
            <a href="chats.html" class="menu-item active"><i class="fa-solid fa-comments"></i><span>المحادثات</span></a>
            <a href="products.html" class="menu-item"><i class="fa-solid fa-pills"></i><span>إدارة الأصناف</span></a>
            <a href="users.html" class="menu-item"><i class="fa-solid fa-user-shield"></i><span>الموظفين</span></a>
        </ul>
    </aside>

    <main class="main-content">
        <header class="app-header">
            <div class="header-title">محادثات العملاء المباشرة</div>
            <div class="header-actions">
                <div class="admin-profile">
                    <div class="admin-avatar"><i class="fa-solid fa-user-doctor"></i></div>
                    <div id="adminNameDisplay">د. مروان</div>
                </div>
            </div>
        </header>

        <div class="page-content">
            <div class="chat-layout">
                <!-- Sidebar: List of Chats -->
                <div class="chat-sidebar">
                    <div class="chat-list-header">المحادثات النشطة</div>
                    <div class="chat-list" id="chatList">
                        <!-- Loaded through JS -->
                        <div style="padding: 20px; color: #999; text-align: center;">جاري تحميل المحادثات...</div>
                    </div>
                </div>

                <!-- Chat Window -->
                <div class="chat-window">
                    <div id="emptyState" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999;">
                        <i class="fa-solid fa-comment-dots" style="font-size: 4rem; margin-bottom: 20px;"></i>
                        <p>اختر محادثة من القائمة للبدء في الرد</p>
                    </div>

                    <div id="chatBox" style="display: none; height: 100%; flex-direction: column;">
                        <div class="chat-box-header">
                            <div style="font-weight: 800;" id="activeChatName">اسم العميل</div>
                            <div style="font-size: 0.8rem; color: #10b981;"><i class="fa-solid fa-circle"></i> متصل</div>
                        </div>
                        <div class="chat-box-messages" id="chatBoxMessages">
                            <!-- Messages -->
                        </div>
                        <div class="chat-box-input">
                            <input type="text" id="adminChatInput" placeholder="اكتب ردك هنا...">
                            <button class="btn-submit" id="adminSendBtn" style="padding: 10px 25px;">إرسال</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { fsListenToAllChats, fsListenToMessages, fsSendMessage } from '../shared/firebase-db.js';

        const listContainer = document.getElementById('chatList');
        const chatBox = document.getElementById('chatBox');
        const emptyState = document.getElementById('emptyState');
        const chatBoxMessages = document.getElementById('chatBoxMessages');
        const adminInput = document.getElementById('adminChatInput');
        const adminSendBtn = document.getElementById('adminSendBtn');

        let activeChatId = null;
        let unsubscribeMessages = null;

        // Listen for all chats
        fsListenToAllChats((chats) => {
            if (chats.length === 0) {
                listContainer.innerHTML = '<div style="padding: 40px; text-align: center; color: #999;">لا توجد محادثات حالياً</div>';
                return;
            }

            listContainer.innerHTML = chats.map(chat => `
                <div class="chat-list-item ${activeChatId === chat.id ? 'active' : ''}" onclick="window.selectChat('${chat.id}', '${chat.customerName}')">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div style="flex: 1;">
                        <div style="font-weight: 800; font-size: 0.9rem;">${chat.customerName}</div>
                        <div style="font-size: 0.75rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${chat.lastMessage}</div>
                    </div>
                </div>
            `).join('');
        });

        window.selectChat = (chatId, customerName) => {
            activeChatId = chatId;
            document.getElementById('activeChatName').innerText = customerName;
            emptyState.style.display = 'none';
            chatBox.style.display = 'flex';

            if (unsubscribeMessages) unsubscribeMessages();

            unsubscribeMessages = fsListenToMessages(chatId, (messages) => {
                chatBoxMessages.innerHTML = messages.map(msg => `
                    <div class="msg ${msg.senderId === 'admin' ? 'msg-staff' : 'msg-cust'}">
                        ${msg.text}
                        <div style="font-size: 0.65rem; opacity: 0.7; margin-top: 5px;">${new Date(msg.timestamp).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                `).join('');
                chatBoxMessages.scrollTop = chatBoxMessages.scrollHeight;
            });
        };

        async function sendResponse() {
            const text = adminInput.value.trim();
            if (!text || !activeChatId) return;

            adminInput.value = '';
            await fsSendMessage(activeChatId, 'admin', 'الصيدلية', text);
        }

        adminSendBtn.addEventListener('click', sendResponse);
        adminInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendResponse();
        });
    </script>
</body>
</html>
