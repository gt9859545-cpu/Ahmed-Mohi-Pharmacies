<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رموز الخصم - صيدليات أحمد محي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }
        .input-group input, .input-group select { padding: 12px 16px; border: 1.5px solid var(--border-color); border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary-color); }
        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 800; font-family: 'Tajawal', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="../logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40';">
            <span>مدير الصيدلية</span>
        </div>
        <ul class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>لوحة التحكم</span>
            </a>
            <a href="orders.html" class="menu-item">
                <i class="fa-solid fa-box-open"></i>
                <span>الطلبات</span>
            </a>
            <a href="prescriptions.html" class="menu-item">
                <i class="fa-solid fa-file-prescription"></i>
                <span>الروشتات المرفوعة</span>
            </a>
            <a href="products.html" class="menu-item">
                <i class="fa-solid fa-pills"></i>
                <span>إدارة الأصناف</span>
            </a>
            <a href="promos.html" class="menu-item active">
                <i class="fa-solid fa-ticket"></i>
                <span>رموز الخصم العامة</span>
            </a>
            <a href="users.html" class="menu-item">
                <i class="fa-solid fa-user-shield"></i>
                <span>الموظفين والصلاحيات</span>
            </a>
            <a href="customers.html" class="menu-item">
                <i class="fa-solid fa-users"></i>
                <span>العملاء والعروض</span>
            </a>
            <a href="profile.html" class="menu-item">
                <i class="fa-solid fa-user-pen"></i>
                <span>الملف الشخصي</span>
            </a>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="app-header">
            <div class="header-title">إدارة رموز الخصم والكوبونات</div>
            <div class="header-actions">
                <div class="admin-profile">
                    <div class="admin-avatar"><i class="fa-solid fa-user-shield"></i></div>
                    <div>
                        <div id="adminNameDisplay" style="font-size: 0.95rem;">الإدارة العليا</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); cursor: pointer;" onclick="logoutAdmin()">تسجيل الخروج</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            
            <div class="form-container">
                <div style="font-size: 1.2rem; font-weight: 800; margin-bottom: 20px;">إنشاء كود خصم جديد</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>الرمز (Promo Code)</label>
                        <input type="text" id="newPromoCode" placeholder="مثال: NEWYEAR2026">
                    </div>
                    <div class="input-group">
                        <label>نوع الخصم</label>
                        <select id="newPromoType">
                            <option value="percentage">نسبة مئوية (%)</option>
                            <option value="fixed">مبلغ ثابت (ج.م)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>قيمة الخصم</label>
                        <input type="number" id="newPromoValue" placeholder="مثال: 15">
                    </div>
                    <div class="input-group">
                        <label>مرات الاستخدام الأقصى</label>
                        <input type="number" id="newPromoLimit" placeholder="100">
                    </div>
                </div>
                <button class="btn-submit" onclick="addNewPromo()"><i class="fa-solid fa-check"></i> تفعيل الكود</button>
            </div>

            <div class="data-table-container">
                <div class="table-header">
                    <div class="table-title">رموز الخصم الفعالة</div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>الرمز</th>
                            <th>نوع الخصم / القيمة</th>
                            <th>الاستخدامات (المتبقية)</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="adminPromosTable">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>

        </div>
    </main>

    <script src="../shared/db.js"></script>
    <script src="script.js"></script>
</body>
</html>
