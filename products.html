<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأصناف - صيدليات أحمد محي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        .form-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); }
        .input-group input, .input-group select { padding: 12px 16px; border: 1.5px solid var(--border-color); border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; outline: none; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary-color); }
        .btn-submit { background: var(--secondary-color); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 800; font-family: 'Tajawal', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>
    
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="../logo.jpg" alt="Logo" onerror="this.src='https://via.placeholder.com/40';">
            <span>مدير الصيدلية</span>
        </div>
        <ul class="sidebar-menu">
            <a href="index.html" class="menu-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>لوحة التحكم</span>
            </a>
            <a href="orders.html" class="menu-item">
                <i class="fa-solid fa-box-open"></i>
                <span>الطلبات</span>
            </a>
            <a href="prescriptions.html" class="menu-item">
                <i class="fa-solid fa-file-prescription"></i>
                <span>الروشتات المرفوعة</span>
            </a>
            <a href="products.html" class="menu-item active">
                <i class="fa-solid fa-pills"></i>
                <span>إدارة الأصناف</span>
            </a>
            <a href="promos.html" class="menu-item">
                <i class="fa-solid fa-ticket"></i>
                <span>رموز الخصم العامة</span>
            </a>
            <a href="users.html" class="menu-item">
                <i class="fa-solid fa-user-shield"></i>
                <span>الموظفين والصلاحيات</span>
            </a>
            <a href="customers.html" class="menu-item">
                <i class="fa-solid fa-users"></i>
                <span>العملاء والعروض</span>
            </a>
            <a href="profile.html" class="menu-item">
                <i class="fa-solid fa-user-pen"></i>
                <span>الملف الشخصي</span>
            </a>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="app-header">
            <div class="header-title">إدارة الأصناف والمنتجات</div>
            <div class="header-actions">
                <div class="admin-profile">
                    <div class="admin-avatar"><i class="fa-solid fa-user-shield"></i></div>
                    <div>
                        <div id="adminNameDisplay" style="font-size: 0.95rem;">الإدارة العليا</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted); cursor: pointer;" onclick="logoutAdmin()">تسجيل الخروج</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            
            <div class="form-container">
                <div class="form-title">إضافة صنف جديد</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>اسم الصنف</label>
                        <input type="text" id="newProdName" placeholder="مثال: بانادول إكسترا">
                    </div>
                    <div class="input-group">
                        <label>القسم / التصنيف</label>
                        <select id="newProdCat">
                            <option value="أقراص">الأدوية - أقراص</option>
                            <option value="شرب">الأدوية - شرب</option>
                            <option value="العناية بالبشرة">العناية بالبشرة</option>
                            <option value="العناية بالشعر">العناية بالشعر</option>
                            <option value="مستلزمات طبية">مستلزمات طبية</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>السعر (بالجنيه المصري)</label>
                        <input type="number" id="newProdPrice" placeholder="مثال: 35">
                    </div>
                    <div class="input-group">
                        <label>صورة المنتج (رابط أو رفع)</label>
                        <input type="text" id="newProdImg" placeholder="رابط الصورة مباشر">
                    </div>
                </div>
                <button class="btn-submit" onclick="addNewProduct()"><i class="fa-solid fa-plus"></i> إضافة المنتج للمتجر</button>
            </div>

            <div class="data-table-container">
                <div class="table-header">
                    <div class="table-title">الأصناف المتاحة</div>
                    <div class="table-actions">
                        <input type="text" oninput="searchProducts(this.value)" placeholder="بحث باسم الدواء..." style="padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-family: Tajawal; outline: none; margin-left:10px;">
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>الصورة</th>
                            <th>الاسم</th>
                            <th>القسم</th>
                            <th>السعر</th>
                            <th>الحالة</th>
                            <th>إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="adminProductsTable">
                        <!-- Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Edit Price Modal -->
        <div id="editPriceModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:white; padding:30px; border-radius:16px; width:90%; max-width:400px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
                <h3 style="margin-bottom:20px; font-weight:800;">تعديل سعر المنتج</h3>
                <div class="input-group" style="margin-bottom:20px;">
                    <label>السعر الجديد (ج.م)</label>
                    <input type="number" id="editProdPriceInput" style="width: 100%; padding: 12px; border: 1.5px solid var(--border-color); border-radius: 8px;">
                </div>
                <input type="hidden" id="editProdId">
                <div style="display:flex; gap:10px;">
                    <button class="btn-submit" onclick="saveNewPrice()" style="flex:1;">حفظ التغيير</button>
                    <button class="btn-submit" onclick="closeEditModal()" style="flex:1; background:#eee; color:#333;">إلغاء</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../shared/db.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
