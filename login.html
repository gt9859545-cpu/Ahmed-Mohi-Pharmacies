<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f3659;
            --secondary: #4bd126;
            --bg: #f1f5f9;
        }
        body {
            margin: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f3659 0%, #1e40af 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 16px;
        }
        h1 { color: var(--primary); font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--primary); font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--primary); }
        
        .login-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover { background: #0b2843; }
        .login-btn:active { transform: scale(0.98); }
        
        .error-msg { color: #ef4444; font-size: 0.85rem; margin-top: 15px; display: none; font-weight: 700; }
        
        .footer-note { margin-top: 25px; color: #94a3b8; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../logo.jpg" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/80';">
        <h1>لوحة تحكم الصيدلية</h1>
        <p>مرحباً بك، يرجى تسجيل الدخول للمتابعة</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            
            <div id="errorBox" class="error-msg">خطأ في اسم المستخدم أو كلمة المرور!</div>
            <div id="statusBox" class="error-msg" style="color: #f59e0b;">عفواً، هذا الحساب موقوف حالياً.</div>
            
            <button type="submit" class="login-btn">دخول لوحة التحكم</button>
        </form>
        
        <div class="footer-note">نظام صيدليات أحمد محي الذكي © 2026</div>
    </div>

    <script src="../shared/db.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            const statusBox = document.getElementById('statusBox');
            
            errorBox.style.display = 'none';
            statusBox.style.display = 'none';

            const users = getDB(DB_KEYS.USERS);
            const user = users.find(u => u.username === userVal && u.password === passVal);

            if (user) {
                if (user.status === 'suspended') {
                    statusBox.style.display = 'block';
                    return;
                }
                // Success
                localStorage.setItem('admin_session', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
